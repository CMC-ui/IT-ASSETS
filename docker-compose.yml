version: '3.8'

services:
  itassets:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - app_data:/app/Data
      - uploads_data:/app/uploads
    expose:
      - "8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/Data/app.db

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - itassets

volumes:
  app_data:
  uploads_data:
